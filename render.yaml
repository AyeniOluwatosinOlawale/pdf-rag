services:
  - type: web
    name: pdf-rag
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # you'll paste this in the Render dashboard
      - key: QDRANT_DIR
        value: /data/qdrant_db
    disk:
      name: qdrant-data
      mountPath: /data
      sizeGB: 1
